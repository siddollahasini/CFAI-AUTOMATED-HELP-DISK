<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Help Desk Chatbot</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#74ebd5,#9face6);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:500px;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    overflow:hidden;
}

.header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:15px;
}

.header h2{
    margin-bottom:5px;
}

.chatbox{
    height:400px;
    overflow-y:auto;
    padding:15px;
    background:#f8f9fa;
}

.message{
    margin:10px 0;
    padding:10px;
    border-radius:10px;
    max-width:80%;
}

.user{
    background:#caf0f8;
    margin-left:auto;
    text-align:right;
}

.bot{
    background:#e9ecef;
}

.input-area{
    display:flex;
    border-top:1px solid #ddd;
}

input{
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:16px;
}

button{
    background:#0077b6;
    color:white;
    border:none;
    padding:15px 20px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#023e8a;
}

.footer{
    text-align:center;
    padding:10px;
    background:#f1f1f1;
    font-size:12px;
    color:#555;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>🏥 Hospital Help Desk Chatbot</h2>
        <p>Ask your hospital-related queries</p>
    </div>

    <div class="chatbox" id="chatbox">
        <div class="message bot">
            Welcome to Hospital Help Desk Chatbot 👋
        </div>
        <div class="message bot">
            Type your question below.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter your question...">
        <button onclick="chatbot()">Send</button>
    </div>

    <div class="footer">
        AI Hospital Help Desk System
    </div>

</div>

<script>

const rules = {
    "appointment":"You can book appointments at reception.",
    "doctor":"Doctors are available in Cardiology and Pediatrics.",
    "timing":"Hospital timings are 8 AM to 8 PM.",
    "emergency":"Emergency services are available 24/7.",
    "ambulance":"Ambulance service is available 24/7.",
    "blood":"Blood bank services are available.",
    "fees":"Consultation fee starts from Rs.300.",
    "medicine":"Please consult the doctor before taking medicine.",
    "lab":"Lab testing services are available.",
    "canteen":"Hospital canteen is open from 7 AM to 9 PM.",
    "icu":"ICU services are available for critical patients.",
    "scan":"MRI and CT Scan facilities are available.",
    "insurance":"Insurance facilities are accepted here.",
    "covid":"COVID vaccination is available.",
    "room":"Both AC and Non-AC rooms are available."
};

function addMessage(text,type){

    const chatbox=document.getElementById("chatbox");

    const msg=document.createElement("div");
    msg.classList.add("message",type);
    msg.innerHTML=text;

    chatbox.appendChild(msg);
    chatbox.scrollTop=chatbox.scrollHeight;
}

function chatbot(){

    let user=document.getElementById("userInput").value.trim().toLowerCase();

    if(user==="") return;

    addMessage(user,"user");

    let response="";

    if(user==="exit"){
        response="Thank you. Stay healthy 😊";
    }
    else if(user.includes("hello") || user.includes("hi")){
        response="Hello! How can I help you?";
    }
    else if(user.includes("thank")){
        response="You're welcome 😊";
    }
    else if(user.includes("doctor sunday")){
        response="Doctor not available on Sunday.";
    }
    else if(user.includes("search")){
        response=
        "Visited: Reception<br>" +
        "Visited: Doctor Room<br>" +
        "Visited: Lab<br>" +
        "Visited: Pharmacy<br>" +
        "Visited: Scan Room";
    }
    else if(rules[user]){
        response=rules[user];
    }
    else{
        response="Sorry, I did not understand your question.";
    }

    addMessage(response,"bot");

    document.getElementById("userInput").value="";
}

document.getElementById("userInput")
.addEventListener("keypress",function(event){
    if(event.key==="Enter"){
        chatbot();
    }
});

</script>

</body>
</html>
